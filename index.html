<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Tambang Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

.header{
    text-align:center;
    padding:15px;
    background:#222;
    font-size:24px;
}

.viewer-container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

model-viewer{
    width:100%;
    height:500px;
    background:#333;
    border-radius:10px;
}

.full{
    grid-column:1/3;
    height:700px;
}

</style>
</head>

<body>

<div class="header">
3D RealityScan Viewer
</div>

<div class="viewer-container">

<!-- Viewer 1 -->
<model-viewer
src="model1.glb"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1"
environment-image="neutral"
alt="Model 1">
</model-viewer>

<!-- Viewer 2 -->
<model-viewer
src="model2.glb"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1"
environment-image="neutral"
alt="Model 2">
</model-viewer>

<!-- Viewer 3 -->
<model-viewer
class="full"
src="model3.glb"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1"
environment-image="neutral"
alt="Model 3">
</model-viewer>

</div>

</body>
</html>
